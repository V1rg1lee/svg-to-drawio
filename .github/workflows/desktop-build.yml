name: Desktop Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Desktop packages (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            artifact-name: svg-to-drawio-linux
          - os: windows-latest
            os-label: Windows
            artifact-name: svg-to-drawio-windows
          - os: macos-latest
            os-label: macOS
            artifact-name: svg-to-drawio-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-desktop.txt

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Read application version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c "from svg_to_drawio import __version__; print(__version__)")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build desktop bundle
        run: python build_desktop.py

      - name: Prepare release directory
        shell: bash
        run: mkdir -p dist/release

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          .\packaging\windows\build_installer.ps1
          -Version "${{ steps.version.outputs.value }}"
          -InputExe "dist\desktop\svg-to-drawio.exe"
          -OutputDir "dist\release"

      - name: Download appimagetool
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L \
            -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          chmod +x packaging/linux/AppRun packaging/linux/build_appimage.sh

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          packaging/linux/build_appimage.sh \
            dist/desktop/svg-to-drawio \
            "${{ steps.version.outputs.value }}" \
            ./appimagetool-x86_64.AppImage \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-x86_64.AppImage"

      - name: Archive bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist\desktop\svg-to-drawio.exe
          -DestinationPath dist\release\svg-to-drawio-${{ steps.version.outputs.value }}-windows.zip

      - name: Archive bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux.tar.gz" \
            -C dist/desktop \
            svg-to-drawio

      - name: Archive bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/desktop/svg-to-drawio.app \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/release/*

      - name: Attach release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
