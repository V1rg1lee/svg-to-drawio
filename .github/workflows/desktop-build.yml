name: Desktop Build

on:
  workflow_dispatch:
  release:
    types: [published]

# Least-privilege default: jobs that don't upload anything get read-only.
permissions:
  contents: read

jobs:
  build:
    name: Desktop packages (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    # Only this job needs write — to upload release assets.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            artifact-name: svg-to-drawio-linux
          - os: windows-latest
            os-label: Windows
            artifact-name: svg-to-drawio-windows
          - os: macos-latest
            os-label: macOS
            artifact-name: svg-to-drawio-macos

    steps:
      # Pinned to commit SHA to prevent tag-rewrite supply-chain attacks.
      # To update: find the new SHA on the action's Releases page, then update
      # the comment and the hash together so the version stays readable.
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-desktop.txt

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Read application version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c "from svg_to_drawio import __version__; print(__version__)")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Release tag version ($TAG_VERSION) does not match package version (${{ steps.version.outputs.value }})." >&2
            exit 1
          fi

      - name: Build desktop bundle
        run: python build_desktop.py

      - name: Build Windows installer bundle
        if: runner.os == 'Windows'
        run: python build_desktop.py --bundle-mode onedir --dist-dir dist/desktop-installer

      - name: Prepare release directory
        shell: bash
        run: mkdir -p dist/release

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          .\packaging\windows\build_installer.ps1
          -Version "${{ steps.version.outputs.value }}"
          -InputDir "dist\desktop-installer\svg-to-drawio"
          -OutputDir "dist\release"

      - name: Download appimagetool
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L \
            -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          chmod +x packaging/linux/AppRun packaging/linux/build_appimage.sh

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          packaging/linux/build_appimage.sh \
            dist/desktop/svg-to-drawio \
            "${{ steps.version.outputs.value }}" \
            ./appimagetool-x86_64.AppImage \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-x86_64.AppImage"

      - name: Archive bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist\desktop\svg-to-drawio.exe
          -DestinationPath dist\release\svg-to-drawio-${{ steps.version.outputs.value }}-windows.zip

      - name: Archive bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux.tar.gz" \
            -C dist/desktop \
            svg-to-drawio

      - name: Archive bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/desktop/svg-to-drawio.app \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/release/*

      # gh CLI is pre-installed on all GitHub-hosted runners — no third-party action needed.
      - name: Attach release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" --clobber dist/release/*
