name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pre-commit checks
        run: python -m pre_commit run --all-files --show-diff-on-failure --color=always

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements-desktop.txt

      - name: Install Qt runtime libraries for headless desktop tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-desktop.txt
          python -m pip install -e ".[watch]"

      - name: Run regression suite
        run: python -m unittest discover -s tests -v

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test packaged CLI
        run: |
          svg-to-drawio --version
          python -m svg_to_drawio --version

  changes:
    name: Detect desktop-relevant changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine whether desktop packaging is affected
        id: filter
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          if [[ -z "${BASE_SHA:-}" || "$BASE_SHA" == "$zero_sha" ]] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "No usable base commit (new branch or shallow history); running desktop packaging."
            echo "desktop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" HEAD)"
          echo "Changed files since $BASE_SHA:"
          echo "$changed_files"

          pattern='^(svg_to_drawio/|svg_to_drawio_desktop/|packaging/|build_desktop\.py|desktop_app\.py|requirements-desktop\.txt|pyproject\.toml|\.github/workflows/desktop-packaging\.yml|\.github/workflows/ci\.yml)'
          if echo "$changed_files" | grep -qE "$pattern"; then
            echo "Desktop-relevant change detected; running desktop packaging."
            echo "desktop=true" >> "$GITHUB_OUTPUT"
          else
            echo "No desktop-relevant change; skipping desktop packaging."
            echo "desktop=false" >> "$GITHUB_OUTPUT"
          fi

  desktop-packages:
    name: Desktop deliverables
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/desktop-packaging.yml
