name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pre-commit checks
        run: python -m pre_commit run --all-files --show-diff-on-failure --color=always

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements-desktop.txt

      - name: Install Qt runtime libraries for headless desktop tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-desktop.txt
          python -m pip install -e ".[watch]"

      - name: Run regression suite
        run: python -m unittest discover -s tests -v

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test packaged CLI
        run: |
          svg-to-drawio --version
          python -m svg_to_drawio --version

  desktop-packages:
    name: Desktop deliverables (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            os-label: Linux x64
            platform-family: linux
            package-arch: x64
            appimage-arch: x86_64
            build-linux-installers: true
            build-windows-installer: false
          - os: ubuntu-24.04-arm
            os-label: Linux ARM64
            platform-family: linux
            package-arch: arm64
            appimage-arch: aarch64
            build-linux-installers: true
            build-windows-installer: false
          - os: windows-2025
            os-label: Windows x64
            platform-family: windows
            package-arch: x64
            build-linux-installers: false
            build-windows-installer: true
          - os: windows-11-arm
            os-label: Windows ARM64
            platform-family: windows
            package-arch: arm64
            build-linux-installers: false
            build-windows-installer: true
          - os: macos-latest
            os-label: macOS
            platform-family: macos
            package-arch: x64
            build-linux-installers: false
            build-windows-installer: false

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-desktop.txt

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Install Linux packaging dependencies
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends elfutils flatpak flatpak-builder

      - name: Read application version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c "from svg_to_drawio import __version__; print(__version__)")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read Linux package architecture
        if: matrix.platform-family == 'linux'
        id: linux-arch
        shell: bash
        run: |
          echo "value=$(dpkg --print-architecture)" >> "$GITHUB_OUTPUT"

      - name: Build desktop bundle
        run: python build_desktop.py

      - name: Build Windows installer bundle
        if: matrix.build-windows-installer
        run: python build_desktop.py --bundle-mode onedir --dist-dir dist/desktop-installer

      - name: Build Linux installer bundle
        if: matrix.build-linux-installers
        run: python build_desktop.py --bundle-mode onedir --dist-dir dist/desktop-linux-package

      - name: Prune optional Qt plugins from Linux installer bundle
        if: matrix.build-linux-installers
        shell: bash
        run: bash packaging/linux/prune_bundle.sh dist/desktop-linux-package/svg-to-drawio

      - name: Prepare release directory
        shell: bash
        run: mkdir -p dist/release

      - name: Install Inno Setup
        if: matrix.build-windows-installer
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download appimagetool
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          curl -L \
            -o "appimagetool-${{ matrix.appimage-arch }}.AppImage" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage-arch }}.AppImage"
          chmod +x "appimagetool-${{ matrix.appimage-arch }}.AppImage"
          chmod +x \
            packaging/linux/common.sh \
            packaging/linux/AppRun \
            packaging/linux/build_appimage.sh \
            packaging/linux/build_deb.sh \
            packaging/linux/build_rpm.sh \
            packaging/linux/build_rpm_in_fedora_container.sh \
            packaging/linux/build_flatpak.sh \
            packaging/linux/prune_bundle.sh \
            packaging/linux/smoke_test_artifacts.sh \
            packaging/macos/smoke_test_artifacts.sh

      - name: Build Windows installer
        if: matrix.build-windows-installer
        shell: pwsh
        run: >
          .\packaging\windows\build_installer.ps1
          -Version "${{ steps.version.outputs.value }}"
          -InputDir "dist\desktop-installer\svg-to-drawio"
          -OutputDir "dist\release"
          -PackageArchitecture "${{ matrix.package-arch }}"

      - name: Build Linux AppImage
        if: matrix.platform-family == 'linux'
        shell: bash
        env:
          ARCH: ${{ matrix.appimage-arch }}
        run: |
          packaging/linux/build_appimage.sh \
            dist/desktop/svg-to-drawio \
            "${{ steps.version.outputs.value }}" \
            "./appimagetool-${{ matrix.appimage-arch }}.AppImage" \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-${{ matrix.package-arch }}.AppImage"

      - name: Build Linux Debian package
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          packaging/linux/build_deb.sh \
            dist/desktop-linux-package/svg-to-drawio \
            "${{ steps.version.outputs.value }}" \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-${{ steps.linux-arch.outputs.value }}.deb"

      - name: Build Linux RPM package
        if: matrix.platform-family == 'linux'
        shell: bash
        run: packaging/linux/build_rpm_in_fedora_container.sh "${{ steps.version.outputs.value }}"

      - name: Build Linux Flatpak bundle
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          FLATPAK_ARCH="$(flatpak --default-arch | tr -d '\r')"
          packaging/linux/build_flatpak.sh \
            dist/desktop-linux-package/svg-to-drawio \
            "${{ steps.version.outputs.value }}" \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-${FLATPAK_ARCH}.flatpak"

      - name: Archive bundle (Windows)
        if: matrix.platform-family == 'windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist\desktop\svg-to-drawio.exe
          -DestinationPath dist\release\svg-to-drawio-${{ steps.version.outputs.value }}-windows-${{ matrix.package-arch }}.zip

      - name: Archive bundle (Linux)
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          tar -czf \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-linux-${{ matrix.package-arch }}.tar.gz" \
            -C dist/desktop \
            svg-to-drawio

      - name: Archive bundle (macOS)
        if: matrix.platform-family == 'macos'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/desktop/svg-to-drawio.app \
            "dist/release/svg-to-drawio-${{ steps.version.outputs.value }}-macos.zip"

      - name: Smoke-test packaged Linux deliverables
        if: matrix.platform-family == 'linux'
        shell: bash
        run: |
          bash packaging/linux/smoke_test_artifacts.sh \
            "${{ steps.version.outputs.value }}" \
            "${{ matrix.package-arch }}"

      - name: Smoke-test packaged Windows deliverables
        if: matrix.platform-family == 'windows'
        shell: pwsh
        run: >
          .\packaging\windows\smoke_test_artifacts.ps1
          -Version "${{ steps.version.outputs.value }}"
          -PackageArchitecture "${{ matrix.package-arch }}"

      - name: Smoke-test packaged macOS deliverables
        if: matrix.platform-family == 'macos'
        shell: bash
        run: bash packaging/macos/smoke_test_artifacts.sh "${{ steps.version.outputs.value }}"
