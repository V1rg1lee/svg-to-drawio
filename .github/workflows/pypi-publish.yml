name: Python Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and validate Python package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c "from svg_to_drawio import __version__; print(__version__)")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "${{ steps.version.outputs.value }}" ]]; then
            echo "Release tag version ($TAG_VERSION) does not match package version (${{ steps.version.outputs.value }})." >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test packaged CLI
        run: |
          svg-to-drawio --version
          python -m svg_to_drawio --version

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: svg-to-drawio-python-dist
          path: dist/*

      - name: Attach package artifacts to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" --clobber dist/*

  publish:
    name: Publish package to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/svg-to-drawio
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: svg-to-drawio-python-dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
